<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@Cricinsider365</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<style>

body{
  background:#0a0f1c;
  font-family:system-ui;
  color:white;
  padding-bottom:50px;
}

.match-tile{
  background:#131d2f;
  border-radius:28px;
  border:1px solid #253247;
  overflow:hidden;
  transition:.3s;
  display:flex;
  flex-direction:column;
}

.match-tile:hover{
  transform:translateY(-6px);
  border-color:#3b82f6;
  box-shadow:0 10px 25px -5px rgba(59,130,246,.2);
}

.img-wrapper{
  height:200px;
  overflow:hidden;
  position:relative;
  background:#1e293b;
}

.match-img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.live-badge{
  position:absolute;
  top:12px;
  left:12px;
  background:#dc2626;
  font-size:11px;
  font-weight:800;
  padding:4px 12px;
  border-radius:30px;
}

.btn-watch{
  background:#2563eb;
  padding:14px;
  border-radius:16px;
  text-align:center;
  font-weight:800;
  margin-top:auto;
  cursor:pointer;
}

.btn-watch.not-live{
  background:#1e293b;
  color:#64748b;
  cursor:not-allowed;
}

.modal-overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  z-index:1000;
  align-items:center;
  justify-content:center;
}

.modal-content{
  background:#131d2f;
  width:90%;
  max-width:350px;
  padding:30px;
  border-radius:30px;
  border:1px solid #253247;
  text-align:center;
}

.quality-btn{
  background:#1e293b;
  border:1px solid #253247;
  width:100%;
  padding:15px;
  margin-bottom:10px;
  border-radius:15px;
  font-weight:bold;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
}

.close-btn{
  margin-top:15px;
  color:#ef4444;
  font-weight:bold;
  cursor:pointer;
}

</style>
</head>

<body class="p-5 max-w-7xl mx-auto">

<div class="text-center mb-10 mt-5">
  <div class="inline-flex items-center gap-3 bg-[#131d2f] py-4 px-8 rounded-full border border-blue-900/50">
    <i class="fas fa-bolt text-yellow-400"></i>
    <span class="text-2xl font-black">FANCODE</span>
  </div>
  <p class="text-gray-500 text-xs mt-3">WEB BY @Cricinsider365</p>
</div>

<div id="matches-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>

<div id="quality-modal" class="modal-overlay">
  <div class="modal-content">
    <h3 class="text-xl font-bold mb-5">Select Quality</h3>
    <div id="quality-list"></div>
    <div class="close-btn" onclick="closeModal()">CLOSE</div>
  </div>
</div>
